<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Sample Page</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background-color: #f4f4f4;
        }

        header {
            background: #333;
            color: red;
            padding: 15px;
            text-align: center;
        }

        main {
            padding: 20px;
        }

        button {
            background: #007BFF;
            color: white;
            border: none;
            padding: 10px 15px;
            cursor: pointer;
            border-radius: 5px;
        }

        button:hover {
            background: #0056b3;
        }
    </style>
</head>

<body>

<header>
    <h1>Welcome to My Website</h1>
</header>

<main>
    <h2>About This Page</h2>
    <p>This is a simple HTML example page. You can edit this code and build your own website.</p>

    <img src="https://via.placeholder.com/300" alt="Sample Image">

    <p>Visit 
        <a href="https://www.example.com" target="_blank">
            Example Website
        </a>
    </p>

    <button onclick="showMessage()">Click Me</button>
</main>

<script>
function showMessage() {
    alert("Hello! You clicked the button.");
}
</script>

</body>
</html>
